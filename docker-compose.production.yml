services:
  web:
    build:
      context: .
      dockerfile: Dockerfile.web
      args:
        NEXT_PUBLIC_RELIC_API_URL: ${NEXT_PUBLIC_RELIC_API_URL:-https://api.syntheticrelic.dev}
        NEXT_PUBLIC_RELIC_WS_URL: ${NEXT_PUBLIC_RELIC_WS_URL:-wss://api.syntheticrelic.dev/ws/arena}
    restart: unless-stopped
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_RELIC_API_URL: ${NEXT_PUBLIC_RELIC_API_URL:-https://api.syntheticrelic.dev}
      NEXT_PUBLIC_RELIC_WS_URL: ${NEXT_PUBLIC_RELIC_WS_URL:-wss://api.syntheticrelic.dev/ws/arena}
    depends_on:
      - api

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    restart: unless-stopped
    environment:
      SYNTHETIC_RELIC_ENV: production
      SYNTHETIC_RELIC_ADMIN_TOKEN: ${SYNTHETIC_RELIC_ADMIN_TOKEN:?set SYNTHETIC_RELIC_ADMIN_TOKEN in .env.production}
      SYNTHETIC_RELIC_ORIGINS: ${SYNTHETIC_RELIC_ORIGINS:-https://syntheticrelic.dev}
      SYNTHETIC_RELIC_DB: /data/relic.db
      SYNTHETIC_RELIC_ALLOW_INSECURE_ADMIN: "false"
      SYNTHETIC_RELIC_ENFORCE_HTTPS: "true"
      SYNTHETIC_RELIC_MAX_BODY_BYTES: ${SYNTHETIC_RELIC_MAX_BODY_BYTES:-1000000}
      SYNTHETIC_RELIC_RATE_LIMIT_WINDOW_SECONDS: ${SYNTHETIC_RELIC_RATE_LIMIT_WINDOW_SECONDS:-60}
      SYNTHETIC_RELIC_RATE_LIMIT_MAX_REQUESTS: ${SYNTHETIC_RELIC_RATE_LIMIT_MAX_REQUESTS:-180}
      SYNTHETIC_RELIC_ADMIN_SESSION_TTL_SECONDS: ${SYNTHETIC_RELIC_ADMIN_SESSION_TTL_SECONDS:-3600}
      SYNTHETIC_RELIC_AGENT_CHALLENGE_TTL_SECONDS: ${SYNTHETIC_RELIC_AGENT_CHALLENGE_TTL_SECONDS:-300}
      SYNTHETIC_RELIC_REQUIRE_AGENT_CHALLENGE: ${SYNTHETIC_RELIC_REQUIRE_AGENT_CHALLENGE:-true}
      SYNTHETIC_RELIC_BACKUP_INTERVAL_MINUTES: ${SYNTHETIC_RELIC_BACKUP_INTERVAL_MINUTES:-360}
    volumes:
      - synthetic_relic_data:/data

  caddy:
    image: caddy:2.8-alpine
    restart: unless-stopped
    depends_on:
      - web
      - api
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./deploy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

volumes:
  synthetic_relic_data:
  caddy_data:
  caddy_config:
